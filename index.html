<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Личные сообщения</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 50px;
            background-color: #f4f4f9;
        }
        .container {
            width: 400px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .user-info, .chat-select, .chat-box {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .chat-box {
            display: flex;
            flex-direction: column;
            height: 400px;
            overflow-y: auto;
            gap: 5px;
        }
        .message {
            padding: 5px 10px;
            border-radius: 10px;
            max-width: 80%;
        }
        .message.self {
            background-color: #007bff;
            color: white;
            align-self: flex-end;
        }
        .message.other {
            background-color: #e5e5ea;
            align-self: flex-start;
        }
        input, button, select {
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }
        button {
            background: #f4d800;
            border: none;
            font-weight: bold;
            cursor: pointer;
            color: white;
        }
        button:hover {
            background: #f4a000;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="user-info">
            <button id="loginBtn">Войти через Google</button>
            <button id="logoutBtn" style="display:none;">Выйти</button>
            <div id="currentUser" style="margin-top:10px;"></div>
        </div>

        <div class="chat-select" style="display:none;">
            <select id="userList"></select>
            <button id="startChatBtn">Начать чат</button>
        </div>

        <div class="chat-box" id="chatBox" style="display:none;">
            <div id="messages"></div>
            <input type="text" id="messageInput" placeholder="Ваше сообщение">
            <button id="sendBtn">Отправить</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getFirestore, collection, addDoc, doc, getDocs, query, where, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

        // Firebase конфиг
        const firebaseConfig = {
            apiKey: "AIzaSyC6Od5o91VbuC42L365J56jhrw3RhPN1Y8",
            authDomain: "alissa-2ofaf8.firebaseapp.com",
            projectId: "alissa-2ofaf8",
            storageBucket: "alissa-2ofaf8.appspot.com",
            messagingSenderId: "846548826923",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null;
        let currentChatId = null;
        let unsubscribeMessages = null;

        // ===== Авторизация =====
        const loginBtn = document.getElementById("loginBtn");
        const logoutBtn = document.getElementById("logoutBtn");
        const currentUserDiv = document.getElementById("currentUser");
        const userListDiv = document.getElementById("userList");
        const chatSelectDiv = document.querySelector(".chat-select");
        const chatBoxDiv = document.getElementById("chatBox");

        loginBtn.onclick = async () => {
            try {
                await signInWithPopup(auth, provider);
            } catch(e) { console.error(e); }
        }

        logoutBtn.onclick = () => signOut(auth);

        onAuthStateChanged(auth, async user => {
            if(user) {
                currentUser = user;
                currentUserDiv.textContent = `Вы вошли: ${user.displayName}`;
                loginBtn.style.display = "none";
                logoutBtn.style.display = "block";
                chatSelectDiv.style.display = "block";
                
                // Сохраняем пользователя в Firestore
                await setDoc(doc(db, "users", user.uid), {
                    name: user.displayName,
                    email: user.email
                });

                loadUsers();
            } else {
                currentUser = null;
                currentChatId = null;
                loginBtn.style.display = "block";
                logoutBtn.style.display = "none";
                chatSelectDiv.style.display = "none";
                chatBoxDiv.style.display = "none";
                currentUserDiv.textContent = "";
            }
        });

        // ===== Загрузка списка пользователей =====
        async function loadUsers() {
            const usersSnapshot = await getDocs(collection(db, "users"));
            userListDiv.innerHTML = "";
            usersSnapshot.forEach(docu => {
                if(docu.id !== currentUser.uid) {
                    const option = document.createElement("option");
                    option.value = docu.id;
                    option.textContent = docu.data().name;
                    userListDiv.appendChild(option);
                }
            });
        }

        // ===== Начало чата =====
        document.getElementById("startChatBtn").onclick = async () => {
            const selectedUserId = userListDiv.value;
            if(!selectedUserId) return;

            // Проверка существующего чата
            const chatsRef = collection(db, "chats");
            const q = query(chatsRef, where("participants", "array-contains", currentUser.uid));
            const chatsSnapshot = await getDocs(q);

            let chatDoc = null;
            chatsSnapshot.forEach(chat => {
                const participants = chat.data().participants;
                if(participants.includes(selectedUserId)) {
                    chatDoc = chat;
                }
            });

            if(chatDoc) {
                currentChatId = chatDoc.id;
            } else {
                // Создаем новый чат
                const newChat = await addDoc(chatsRef, {
                    participants: [currentUser.uid, selectedUserId],
                    lastMessage: { text: "", timestamp: new Date() }
                });
                currentChatId = newChat.id;
            }

            openChat(currentChatId);
        }

        // ===== Открытие чата и получение сообщений =====
        function openChat(chatId) {
            chatBoxDiv.style.display = "flex";
            document.getElementById("messages").innerHTML = "";

            if(unsubscribeMessages) unsubscribeMessages();

            const messagesRef = collection(db, `chats/${chatId}/messages`);
            unsubscribeMessages = onSnapshot(messagesRef, snapshot => {
                const messagesDiv = document.getElementById("messages");
                messagesDiv.innerHTML = "";
                snapshot.docs.sort((a,b)=> a.data().timestamp.seconds - b.data().timestamp.seconds).forEach(doc => {
                    const msg = doc.data();
                    const div = document.createElement("div");
                    div.classList.add("message");
                    div.classList.add(msg.senderId === currentUser.uid ? "self" : "other");
                    div.textContent = msg.text;
                    messagesDiv.appendChild(div);
                    messagesDiv.scrollTop = messagesDiv.scrollHeight;
                });
            });
        }

        // ===== Отправка сообщений =====
        document.getElementById("sendBtn").onclick = async () => {
            const textInput = document.getElementById("messageInput");
            const text = textInput.value.trim();
            if(!text || !currentChatId) return;

            await addDoc(collection(db, `chats/${currentChatId}/messages`), {
                senderId: currentUser.uid,
                text,
                timestamp: new Date()
            });

            textInput.value = "";
        }
    </script>
</body>
</html>
