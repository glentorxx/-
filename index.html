<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Проект с Firebase</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            padding: 50px;
            background-color: #f4f4f9;
        }
        .form-container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 300px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        input, button {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        button {
            border: none;
            font-weight: bold;
            cursor: pointer;
            background: #f4d800;
            color: white;
        }
        button:hover {
            background: #f4a000;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <button id="loginBtn" onclick="login()">Войти через Google</button>
        <button id="logoutBtn" onclick="logout()" style="display:none;">Выйти</button>

        <form id="feedbackForm" style="display:none;">
            <input type="text" id="userName" placeholder="Ваше имя" required>
            <input type="email" id="userEmail" placeholder="Ваш email" required>
            <input type="file" id="userImage" accept="image/*">
            <button type="submit">Отправить</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC6Od5o91VbuC42L365J56jhrw3RhPN1Y8",
            authDomain: "alissa-2ofaf8.firebaseapp.com",
            projectId: "alissa-2ofaf8",
            storageBucket: "alissa-2ofaf8.appspot.com",
            messagingSenderId: "846548826923",
            appId: "YOUR_APP_ID" // вставьте appId из Firebase
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const storage = getStorage(app);
        const provider = new GoogleAuthProvider();

        // ===== Авторизация =====
        async function login() {
            try {
                await signInWithPopup(auth, provider);
            } catch (error) {
                console.error("Ошибка входа:", error);
            }
        }

        function logout() {
            signOut(auth);
        }

        onAuthStateChanged(auth, user => {
            const form = document.getElementById("feedbackForm");
            const loginBtn = document.getElementById("loginBtn");
            const logoutBtn = document.getElementById("logoutBtn");

            if (user) {
                form.style.display = "block";
                loginBtn.style.display = "none";
                logoutBtn.style.display = "block";
            } else {
                form.style.display = "none";
                loginBtn.style.display = "block";
                logoutBtn.style.display = "none";
            }
        });

        // ===== Firestore =====
        async function addData(name, email, imageUrl = null) {
            try {
                await addDoc(collection(db, "requests"), {
                    name,
                    email,
                    image: imageUrl || "",
                    timestamp: new Date()
                });
                alert("Данные сохранены");
            } catch (error) {
                console.error("Ошибка записи:", error);
                alert("Ошибка при отправке данных");
            }
        }

        // ===== Storage =====
        async function uploadImage(file) {
            if (!file) return null;
            const storageRef = ref(storage, `images/${file.name}_${Date.now()}`);
            await uploadBytes(storageRef, file);
            return await getDownloadURL(storageRef);
        }

        // ===== Обработка формы =====
        document.getElementById("feedbackForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const name = document.getElementById("userName").value;
            const email = document.getElementById("userEmail").value;
            const fileInput = document.getElementById("userImage");
            const file = fileInput.files[0];

            const imageUrl = await uploadImage(file);
            await addData(name, email, imageUrl);

            document.getElementById("feedbackForm").reset();
        });
    </script>
</body>
</html>
