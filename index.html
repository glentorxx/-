<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { 
        getFirestore, 
        collection, 
        addDoc, 
        getDocs 
    } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC6Od5o91VbuC42L365J56jhrw3RhPN1Y8",
        authDomain: "alissa-2ofaf8.firebaseapp.com",
        projectId: "alissa-2ofaf8",
        storageBucket: "alissa-2ofaf8.firebasestorage.app",
        messagingSenderId: "846548826923"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // ====== 1. ФУНКЦИЯ ДОБАВЛЕНИЯ ======
    async function addData(name, email) {
        try {
            const docRef = await addDoc(collection(db, "requests"), {
                name: name,
                email: email,
                timestamp: new Date()
            });

            console.log("Документ добавлен с ID:", docRef.id);
            alert("✅ Данные сохранены!");
        } catch (error) {
            console.error("Ошибка:", error);
            alert("❌ Ошибка при сохранении");
        }
    }

    // ====== 2. ФУНКЦИЯ ПОЛУЧЕНИЯ ======
    async function getData() {
        try {
            const querySnapshot = await getDocs(collection(db, "requests"));
            
            let result = [];
            querySnapshot.forEach((doc) => {
                result.push({ id: doc.id, ...doc.data() });
            });

            console.log("📥 Полученные данные:", result);
            return result;

        } catch (error) {
            console.error("Ошибка получения:", error);
        }
    }

    // ====== ОБРАБОТКА ФОРМЫ ======
    document.getElementById("feedbackForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const name = document.getElementById("userName").value;
        const email = document.getElementById("userEmail").value;

        await addData(name, email);

        // (по желанию) сразу получаем данные
        await getData();

        document.getElementById("feedbackForm").reset();
    });
</script>
