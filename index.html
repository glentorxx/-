<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мой обычный проект</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            padding: 50px;
            background-color: #f4f4f9;
        }
        .form-container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 300px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #f4d800;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
        }
        button:hover {
            background: #f4a000;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <form id="feedbackForm">
            <input type="text" id="userName" placeholder="Ваше имя" required>
            <input type="email" id="userEmail" placeholder="Ваш email" required>
            <button type="submit">Отправить</button>
        </form>
    </div>

    <script type="module">
        // Импортируем модули Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        // ВАША КОНФИГУРАЦИЯ FIREBASE (из первого скриншота)
        const firebaseConfig = {
            apiKey: "AIzaSyC6Od5o91VbuC42L365J56jhrw3RhPN1Y8",
            authDomain: "alissa-2ofaf8.firebaseapp.com",
            projectId: "alissa-2ofaf8",
            storageBucket: "alissa-2ofaf8.firebasestorage.app",
            messagingSenderId: "846548826923"
        };

        // Инициализация Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Логика отправки формы
        document.getElementById("feedbackForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const nameInput = document.getElementById("userName").value;
            const emailInput = document.getElementById("userEmail").value;

            try {
                // Запись в коллекцию "requests"
                await addDoc(collection(db, "requests"), {
                    name: nameInput,
                    email: emailInput,
                    timestamp: new Date()
                });
                alert("Готово! Данные сохранены в Firebase.");
                document.getElementById("feedbackForm").reset();
            } catch (error) {
                console.error("Ошибка записи: ", error);
                alert("Ошибка при отправке.");
            }
        });
    </script>
</body>
</html>
